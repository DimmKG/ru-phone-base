name: '🐛 Bug Report'
description: A problem with the library's code, types, or tooling — not a data error (see the Data Error template for that).
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Русскоязычная версия этого шаблона: **🐛 Баг-репорт**.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce / minimal repro
      description: Ideally a small code snippet that reproduces the issue.
      placeholder: |
        import { lookupPhoneNumber } from 'ru-phone-base';

        console.log(lookupPhoneNumber('+7 495 123-45-67'));
      render: ts
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 1.2.1
    validations:
      required: true

  - type: dropdown
    id: entry-point
    attributes:
      label: Entry point
      description: Which part of the package you're using — this changes a lot about how to debug it.
      options:
        - Node (ESM, import from "ru-phone-base")
        - Node (CJS, require("ru-phone-base"))
        - Browser ("ru-phone-base/browser")
        - CLI (ru-phone-base-build / ru-phone-base-diff)
        - Not sure
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Node.js version / browser + bundler
      description: Whichever applies — e.g. "Node 20.11" or "Chrome 124 via Vite 5".

  - type: checkboxes
    id: not-data-error
    attributes:
      label: Scope check
      options:
        - label: This is not a data/database error (see the Data Error template instead).
          required: true
