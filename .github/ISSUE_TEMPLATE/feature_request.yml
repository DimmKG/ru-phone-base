name: '✨ Feature Request'
description: Suggest new functionality for the library or its tooling.
title: '[Feature]: '
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Русскоязычная версия этого шаблона: **✨ Запрос функциональности**.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing or awkward today? What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues, etc.
